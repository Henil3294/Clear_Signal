<div class="score-badge" [class]="colorClass">
  <svg width="100" height="100" viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="36" fill="none" stroke-width="7" class="track"/>
    <circle cx="50" cy="50" r="36" fill="none" stroke-width="7" class="fill"
      [attr.stroke-dasharray]="circumference"
      [attr.stroke-dashoffset]="strokeDashoffset"
      stroke-linecap="round"
      transform="rotate(-90 50 50)"/>
    <text x="50" y="53" text-anchor="middle" class="score-text">{{ score | number:'1.1-1' }}</text>
  </svg>
  <div class="verdict">{{ verdict }}</div>
</div>
