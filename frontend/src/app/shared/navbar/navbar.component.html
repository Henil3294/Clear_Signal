<nav class="navbar">
  <div class="grid-bg"></div>

  <a class="brand" routerLink="/dashboard">
    <div class="brand-icon">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <circle cx="10" cy="10" r="8" stroke="url(#g1)" stroke-width="1.5"/>
        <path d="M6 10h8M10 6l4 4-4 4" stroke="url(#g1)" stroke-width="1.5" stroke-linecap="round"/>
        <defs>
          <linearGradient id="g1" x1="0" y1="0" x2="20" y2="20">
            <stop offset="0%" stop-color="#00d4ff"/>
            <stop offset="100%" stop-color="#a855f7"/>
          </linearGradient>
        </defs>
      </svg>
    </div>
    <span class="brand-name">Clear Signal</span>
  </a>

  <div class="search-bar" *ngIf="auth.isLoggedIn()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <span>Search scans...</span>
  </div>

  <div class="nav-pills" *ngIf="auth.isLoggedIn()">
    <a routerLink="/analyze"   routerLinkActive="active" class="pill pill-cyan">Analyze</a>
    <a routerLink="/dashboard" routerLinkActive="active" class="pill pill-purple">Dashboard</a>
  </div>

  <div class="nav-right" *ngIf="auth.isLoggedIn()">
    <span class="username">{{ auth.currentUser()?.username }}</span>
    <button class="icon-btn" title="History" routerLink="/history">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 8v4l3 3m6-3a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/>
      </svg>
    </button>
    <button class="icon-btn" title="Logout" (click)="auth.logout()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/>
      </svg>
    </button>
  </div>
</nav>
